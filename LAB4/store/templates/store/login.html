{% extends 'store/base.html' %}

{% block content %}
<div class="card" style="max-width: 400px; margin: auto;">
    <h2>Login 🔑</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn" style="width: 100%;">Login</button>
    </form>
    <p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
</div>
{% endblock %}
